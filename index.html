<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Storm 2022-2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; /* Khóa cuộn trang, biến web thành dạng App Fullscreen */
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        /* Animations */
        .fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .fade-in { animation: fadeIn 1s ease-out forwards; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.02); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="w-full h-[100dvh] relative bg-black">

    <!-- ================= WELCOME OVERLAY ================= -->
    <div id="welcome-modal" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl flex flex-col items-center justify-center px-6 transition-opacity duration-1000">
        <div class="max-w-lg text-center fade-in-up flex flex-col items-center">
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight mb-8 leading-snug">
                Hi, chào mừng đến với<br>album của Dượng
            </h1>
            <button id="btn-start-journey" onclick="startJourney()" class="bg-white hover:bg-zinc-200 text-black px-10 py-3.5 rounded-full font-bold text-lg transition-transform active:scale-95 shadow-[0_0_30px_rgba(255,255,255,0.15)]">
                Bắt đầu
            </button>
        </div>
    </div>

    <!-- ================= QUOTE OVERLAY (Hiện sau mỗi 10 ảnh) ================= -->
    <div id="quote-overlay" class="fixed inset-0 z-[70] bg-black/95 backdrop-blur-2xl flex flex-col items-center justify-center px-8 transition-opacity duration-1000 opacity-0 pointer-events-none">
        <div class="max-w-2xl text-center transform translate-y-4 transition-transform duration-1000" id="quote-content">
            <span class="text-4xl md:text-5xl text-zinc-600 font-serif mb-4 block">"</span>
            <p class="text-xl md:text-3xl font-serif italic text-white leading-relaxed mb-8" id="quote-text"></p>
            <p class="text-sm md:text-base text-zinc-500 font-bold tracking-[0.2em] uppercase mb-12" id="quote-author"></p>
            <button onclick="dismissQuoteAndContinue()" class="bg-white hover:bg-zinc-200 text-black px-8 py-3.5 rounded-full font-bold transition-transform active:scale-95 pointer-events-auto shadow-[0_0_30px_rgba(255,255,255,0.15)]">
                Tiếp tục hành trình
            </button>
        </div>
    </div>

    <!-- ================= TOP LEFT BANNER ================= -->
    <div class="fixed top-4 left-4 md:top-8 md:left-8 z-40 bg-black/40 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10 pointer-events-none">
        <p class="text-[9px] md:text-[10px] text-zinc-400 font-bold tracking-[0.2em] uppercase mb-0.5">Dự án lưu trữ</p>
        <h2 class="text-white font-extrabold text-sm md:text-base tracking-widest">STORM</h2>
    </div>

    <!-- ================= BOTTOM RIGHT NOTE ================= -->
    <div class="fixed bottom-4 right-4 md:bottom-6 md:right-6 z-40 pointer-events-none opacity-50">
        <p class="text-[10px] md:text-xs font-mono text-zinc-500 tracking-[0.2em]">#randompic</p>
    </div>

    <!-- ================= FULLSCREEN IMAGE ================= -->
    <div class="fixed inset-0 z-0 bg-black flex items-center justify-center overflow-hidden">
        <!-- Ảnh làm mờ phía sau (Background Blur) giúp ảnh ngang không bị viền đen trống trải -->
        <img id="bg-blur-img" src="" class="absolute inset-0 w-full h-full object-cover blur-3xl scale-110 opacity-0 transition-opacity duration-1000 z-0 pointer-events-none">
        
        <!-- Vòng xoay tải ảnh ẩn -->
        <div id="img-loading" class="hidden absolute inset-0 flex items-center justify-center z-10">
            <div class="w-8 h-8 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        </div>
        
        <!-- Ảnh hiển thị đầy đủ 100% không bị cắt xén (object-contain) -->
        <img id="display-img" src="" alt="Storm Memory" class="absolute inset-0 w-full h-full object-contain opacity-0 transition-opacity duration-1000 z-10">
        
        <!-- Lớp phủ gradient mỏng ở đáy để dễ nhìn nút bấm -->
        <div class="absolute inset-x-0 bottom-0 h-1/3 bg-gradient-to-t from-black/90 to-transparent pointer-events-none z-20"></div>
    </div>

    <!-- ================= FLOATING CONTROLS (NÚT VÀ THỜI GIAN) ================= -->
    <!-- Nút hiển thị liên tục (không biến mất/xuất hiện nữa) -->
    <div id="controls-container" class="fixed bottom-8 md:bottom-12 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 opacity-0 pointer-events-none transition-opacity duration-500">
        <button onclick="handleNextImage()" class="bg-white hover:bg-zinc-200 text-black px-6 md:px-8 py-3.5 md:py-4 rounded-full text-sm md:text-base font-bold shadow-[0_10px_40px_rgba(0,0,0,0.5)] transition-transform active:scale-95 flex items-center gap-2 pointer-events-auto">
            <span>⏭️</span> Bỏ qua & Đổi ảnh
        </button>
        
        <div class="bg-black/60 backdrop-blur-xl border border-white/20 px-5 md:px-6 py-3.5 md:py-4 rounded-full flex items-center justify-center shadow-lg pointer-events-auto">
            <span id="countdown" class="font-mono text-xl md:text-2xl font-bold text-white tracking-tight">25</span>
            <span class="text-zinc-400 text-sm ml-1 font-medium">s</span>
        </div>
    </div>

    <!-- ================= END SESSION OVERLAY ================= -->
    <div id="end-overlay" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-lg flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-700">
        <div class="text-center transform translate-y-4 transition-transform duration-700" id="end-content">
            <h3 class="text-2xl md:text-3xl font-bold text-white mb-3 tracking-tight">Ký ức tạm dừng</h3>
            <p class="text-zinc-400 mb-8 max-w-sm mx-auto px-4">Nhớ tới đây thôi, bước tiếp nào.</p>
            <button onclick="handleNextImage()" class="bg-white hover:bg-zinc-200 text-black px-8 py-3.5 rounded-full font-bold transition-transform active:scale-95 pointer-events-auto shadow-[0_0_30px_rgba(255,255,255,0.15)]">
                Đi tiếp
            </button>
        </div>
    </div>

    <script>
        // --- 1. CẤU HÌNH GITHUB API & QUOTES ---
        const GITHUB_USERNAME = 'tuanly2k4-rgb'; 
        const GITHUB_REPO_NAME = 'StormNTB';      
        const FOLDER_NAME = 'STORM';                    
        
        let imagePaths = []; 
        let shownHistory = []; // Lưu 150 tấm chống trùng
        let imageCount = 0;    // Biến đếm số lượng ảnh đã xem

        // Danh sách các câu quotes về ký ức
        const memoryQuotes = [
            { text: "Ký ức là cuốn nhật ký mà tất cả chúng ta đều mang theo bên mình.", author: "Oscar Wilde" },
            { text: "Chúng ta không nhớ ngày tháng, chúng ta nhớ những khoảnh khắc.", author: "Cesare Pavese" },
            { text: "Quá khứ không bao giờ chết. Thậm chí nó còn chưa từng trôi qua.", author: "William Faulkner" },
            { text: "Có những khoảnh khắc, chỉ khi trở thành ký ức, ta mới biết nó đáng giá nhường nào.", author: "Dr. Seuss" },
            { text: "Ký ức giống như một kho báu giấu kín, càng đào sâu, càng thấy rực rỡ.", author: "Khuyết danh" },
            { text: "Người ta có thể lấy đi của bạn mọi thứ, nhưng không ai có thể lấy đi những ký ức.", author: "Khuyết danh" },
            { text: "Mọi thứ rồi sẽ trôi qua, chỉ có tình người và ký ức là ở lại.", author: "Tôn Yến Tư" },
            { text: "Hãy giữ lấy những ký ức, vì chúng ta không thể quay lại ngày hôm qua.", author: "Khuyết danh" },
            { text: "Điều tồi tệ nhất của ký ức không phải là nỗi đau, mà là sự cô đơn khi nhận ra mình là người duy nhất còn nhớ.", author: "Khuyết danh" },
            { text: "Ký ức giống như cơn bão, đến đột ngột và cuốn đi mọi thứ đang tĩnh lặng.", author: "Khuyết danh" }
        ];

        // --- 2. BIẾN TRẠNG THÁI ---
        let sessionTimer = null;
        let timeLeft = 25; 
        let isApiReady = false;
        let hasStartedJourney = false;

        // --- 3. DOM ELEMENTS ---
        const welcomeModal = document.getElementById('welcome-modal');
        const btnStartJourney = document.getElementById('btn-start-journey');
        const displayImg = document.getElementById('display-img');
        const bgBlurImg = document.getElementById('bg-blur-img');
        const imgLoading = document.getElementById('img-loading');
        const controlsContainer = document.getElementById('controls-container');
        const countdownSpan = document.getElementById('countdown');
        const endOverlay = document.getElementById('end-overlay');
        const endContent = document.getElementById('end-content');
        const quoteOverlay = document.getElementById('quote-overlay');
        const quoteContent = document.getElementById('quote-content');

        // --- 4. HÀM XỬ LÝ LÕI ---

        fetchImagesFromGitHubAPI();

        async function fetchImagesFromGitHubAPI() {
            try {
                const timestamp = new Date().getTime();
                const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO_NAME}/contents/${FOLDER_NAME}?ref=main&t=${timestamp}`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) return;

                const data = await response.json();
                
                imagePaths = data
                    .filter(item => item.type === 'file' && item.name.match(/\.(jpg|jpeg|png|gif|webp|avif)$/i))
                    .map(item => item.download_url);
                
                if (imagePaths.length > 0) {
                    isApiReady = true;
                    if (hasStartedJourney) {
                        startSession();
                    } else {
                        btnStartJourney.innerText = "Bắt đầu";
                    }
                }
            } catch (error) {}
        }

        function startJourney() {
            if (hasStartedJourney) return; // Chống click nhiều lần
            hasStartedJourney = true;

            if (isApiReady) {
                welcomeModal.style.opacity = '0';
                setTimeout(() => { welcomeModal.style.display = 'none'; }, 1000);
                startSession();
            } else {
                btnStartJourney.innerText = "Đang kết nối...";
                // Tự động gọi lại startSession khi API load xong (đã xử lý ở trên)
            }
        }

        // Hàm chung khi bấm đổi ảnh
        function handleNextImage() {
            // Kiểm tra: Nếu đã xem được bội số của 10 ảnh (10, 20, 30...) thì hiện Quote
            if (imageCount > 0 && imageCount % 10 === 0) {
                showQuoteScreen();
            } else {
                startSession();
            }
        }

        function showQuoteScreen() {
            clearInterval(sessionTimer);
            controlsContainer.classList.add('opacity-0', 'pointer-events-none');
            endOverlay.classList.add('opacity-0', 'pointer-events-none');
            
            // Random một câu nói
            const randomQuote = memoryQuotes[Math.floor(Math.random() * memoryQuotes.length)];
            document.getElementById('quote-text').innerText = randomQuote.text;
            document.getElementById('quote-author').innerText = `- ${randomQuote.author} -`;
            
            quoteOverlay.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                quoteContent.classList.replace('translate-y-4', 'translate-y-0');
            }, 50);
        }

        function dismissQuoteAndContinue() {
            quoteContent.classList.replace('translate-y-0', 'translate-y-4');
            quoteOverlay.classList.add('opacity-0', 'pointer-events-none');
            
            // Đợi mờ đi rồi chiếu ảnh tiếp theo
            setTimeout(() => {
                startSession();
            }, 800);
        }

        function startSession() {
            if (imagePaths.length === 0) return;

            // Tăng bộ đếm số lượng ảnh đã xem
            imageCount++;

            clearInterval(sessionTimer);
            timeLeft = 25;

            // Ẩn Overlay
            endOverlay.classList.add('opacity-0', 'pointer-events-none');
            endContent.classList.replace('translate-y-0', 'translate-y-4');
            
            // Hiện lập tức thanh Control
            controlsContainer.classList.remove('opacity-0', 'pointer-events-none');
            countdownSpan.innerText = timeLeft;
            
            // Thuật toán chống trùng 150 ảnh
            const maxHistory = Math.min(150, imagePaths.length - 1);
            let availablePaths = imagePaths.filter(path => !shownHistory.includes(path));

            if (availablePaths.length === 0) {
                shownHistory = [];
                availablePaths = [...imagePaths];
            }

            const selectedImagePath = availablePaths[Math.floor(Math.random() * availablePaths.length)];

            shownHistory.push(selectedImagePath);
            if (shownHistory.length > maxHistory) {
                shownHistory.shift(); 
            }

            // --- SỬA LỖI ANIMATION NÚT BẤM KHI ĐỔI ẢNH LIÊN TỤC ---
            displayImg.classList.remove('opacity-100', 'fade-in'); 
            displayImg.classList.add('opacity-0');
            bgBlurImg.classList.remove('opacity-30');
            bgBlurImg.classList.add('opacity-0');
            
            imgLoading.classList.remove('hidden'); 

            // Khi ảnh tải xong
            displayImg.onload = function() {
                imgLoading.classList.add('hidden');
                
                // Bắt buộc trình duyệt nhận diện trạng thái opacity-0 trước khi fade-in lại
                displayImg.classList.remove('opacity-0');
                requestAnimationFrame(() => {
                    displayImg.classList.add('opacity-100', 'fade-in'); 
                });
                
                // Hiện ảnh mờ viền (để ảnh ngang nhìn đẹp)
                bgBlurImg.classList.remove('opacity-0');
                bgBlurImg.classList.add('opacity-30');

                clearInterval(sessionTimer); // Xóa timer thừa
                sessionTimer = setInterval(tickTimer, 1000);
            };
            
            // Nếu bấm qua ảnh quá nhanh, trình duyệt sẽ tự ngắt load ảnh cũ và chạy ảnh mới
            displayImg.src = selectedImagePath;
            bgBlurImg.src = selectedImagePath;
        }

        function tickTimer() {
            timeLeft--;
            countdownSpan.innerText = timeLeft;

            if (timeLeft <= 0) {
                endSession();
            }
        }

        function endSession() {
            clearInterval(sessionTimer);
            
            controlsContainer.classList.add('opacity-0', 'pointer-events-none');
            
            endOverlay.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                endContent.classList.replace('translate-y-4', 'translate-y-0');
            }, 50);
        }
    </script>
</body>
</html>
